name: Build EXE and Auto Release

on: [push]  # 每次推送都触发

permissions:
  contents: write   # 必须添加，允许创建 Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller -F -i -w XYY.ico -n "WVP目录名称修改工具" main.py

    - name: Upload EXE as artifact (optional)
      uses: actions/upload-artifact@v4
      with:
        name: WVP目录名称修改工具
        path: dist/*.exe

    # ========== 新增：生成动态 tag 名称 ==========
    - name: Generate dynamic tag name
      id: vars
      shell: bash
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "TAG_NAME=auto-build-${SHORT_SHA}" >> $GITHUB_ENV

    # ========== 新增：自动创建 Release 并上传 exe ==========
    - name: Create Release and upload asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: "Auto build for commit ${{ env.TAG_NAME }}"
        prerelease: true                # 标记为预发布（可选）
        files: dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
