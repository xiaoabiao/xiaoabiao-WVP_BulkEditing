name: Build EXE

on: [push]  # 当你推送代码到GitHub时，这个工作流就会自动启动

jobs:
  build:
    runs-on: windows-latest  # 打包环境
    steps:
    - uses: actions/checkout@v4  # 第一步：拉取你的代码

    - name: Set up Python  # 第二步：安装Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies  # 第三步：安装你的项目依赖
      run: pip install -r requirements.txt  # 确保你的仓库里有requirements.txt文件

    - name: Install PyInstaller  # 第四步：安装打包工具
      run: pip install pyinstaller

    - name: Build with PyInstaller  # 第五步：执行打包命令
      run: pyinstaller -F main.py

    - name: Upload EXE  # 第六步：上传打包好的文件
      uses: actions/upload-artifact@v4
      with:
        name: my-windows-exe
        path: dist/*.exe
